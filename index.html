<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <meta name="theme-color" content="#f7f5ff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#091413" media="(prefers-color-scheme: dark)" />
    <title>Ashka — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <style>
      html { background: #f7f5ff; }
      html[data-theme="dark"] { background: #091413; }
    </style>
    <script>
      /* Set browser zoom to 90% on first load */
      (function() {
        try {
          document.body.style.zoom = '90%';
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* Apply zoom after React mounts too */
      document.addEventListener('DOMContentLoaded', function() {
        document.body.style.zoom = '90%';
      });
    </script>
  </body>
</html>
